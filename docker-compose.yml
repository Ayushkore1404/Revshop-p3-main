services:

  # ─── DATABASES ───────────────────────────────────────
  mysql-users:
    image: mysql:8
    container_name: mysql-users
    environment:
      MYSQL_ROOT_PASSWORD: root12345
      MYSQL_DATABASE: revshop_users_db
    ports:
      - "3307:3306"
    networks:
      - revshop-network
    healthcheck:
      test: ["CMD", "mysql", "-u", "root", "-proot12345", "-e", "SELECT 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s

  mysql-products:
    image: mysql:8
    container_name: mysql-products
    environment:
      MYSQL_ROOT_PASSWORD: root12345
      MYSQL_DATABASE: revshop_products_db
    ports:
      - "3308:3306"
    networks:
      - revshop-network
    healthcheck:
      test: ["CMD", "mysql", "-u", "root", "-proot12345", "-e", "SELECT 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s

  mysql-cart:
    image: mysql:8
    container_name: mysql-cart
    environment:
      MYSQL_ROOT_PASSWORD: root12345
      MYSQL_DATABASE: revshop_cart_db
    ports:
      - "3309:3306"
    networks:
      - revshop-network
    healthcheck:
      test: ["CMD", "mysql", "-u", "root", "-proot12345", "-e", "SELECT 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s

  mysql-orders:
    image: mysql:8
    container_name: mysql-orders
    environment:
      MYSQL_ROOT_PASSWORD: root12345
      MYSQL_DATABASE: revshop_orders_db
    ports:
      - "3310:3306"
    networks:
      - revshop-network
    healthcheck:
      test: ["CMD", "mysql", "-u", "root", "-proot12345", "-e", "SELECT 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s

  mysql-payments:
    image: mysql:8
    container_name: mysql-payments
    environment:
      MYSQL_ROOT_PASSWORD: root12345
      MYSQL_DATABASE: revshop_payments_db
    ports:
      - "3311:3306"
    networks:
      - revshop-network
    healthcheck:
      test: ["CMD", "mysql", "-u", "root", "-proot12345", "-e", "SELECT 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s

  mysql-notifications:
    image: mysql:8
    container_name: mysql-notifications
    environment:
      MYSQL_ROOT_PASSWORD: root12345
      MYSQL_DATABASE: revshop_notifications_db
    ports:
      - "3312:3306"
    networks:
      - revshop-network
    healthcheck:
      test: ["CMD", "mysql", "-u", "root", "-proot12345", "-e", "SELECT 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ─── INFRASTRUCTURE ──────────────────────────────────
  eureka-server:
    build: ./eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8761/eureka/apps || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - revshop-network

  config-server:
    build: ./config-server
    container_name: config-server
    ports:
      - "8888:8888"
    environment:
      - eureka.client.serviceUrl.defaultZone=http://eureka-server:8761/eureka/
    depends_on:
      - eureka-server
    networks:
      - revshop-network

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      - eureka.client.serviceUrl.defaultZone=http://eureka-server:8761/eureka/
      - jwt.secret=revshop-super-secret-key-for-jwt-2025-microservices
    depends_on:
      - eureka-server
    networks:
      - revshop-network

  # ─── BUSINESS SERVICES ───────────────────────────────
  user-service:
    build: ./user-service
    container_name: user-service
    restart: always
    ports:
      - "8081:8081"
    environment:
      - spring.datasource.url=jdbc:mysql://mysql-users:3306/revshop_users_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - spring.datasource.username=root
      - spring.datasource.password=root12345
      - eureka.client.serviceUrl.defaultZone=http://eureka-server:8761/eureka/
      - jwt.secret=revshop-super-secret-key-for-jwt-2025-microservices
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    depends_on:
      mysql-users:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - revshop-network

  product-service:
    build: ./product-service
    container_name: product-service
    restart: always
    ports:
      - "8082:8082"
    environment:
      - spring.datasource.url=jdbc:mysql://mysql-products:3306/revshop_products_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - spring.datasource.username=root
      - spring.datasource.password=root12345
      - eureka.client.serviceUrl.defaultZone=http://eureka-server:8761/eureka/
      - jwt.secret=revshop-super-secret-key-for-jwt-2025-microservices
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    depends_on:
      mysql-products:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - revshop-network

  cart-service:
    build: ./cart-service
    container_name: cart-service
    restart: always
    ports:
      - "8083:8083"
    environment:
      - spring.datasource.url=jdbc:mysql://mysql-cart:3306/revshop_cart_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - spring.datasource.username=root
      - spring.datasource.password=root12345
      - eureka.client.serviceUrl.defaultZone=http://eureka-server:8761/eureka/
      - jwt.secret=revshop-super-secret-key-for-jwt-2025-microservices
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    depends_on:
      mysql-cart:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - revshop-network

  order-service:
    build: ./order-service
    container_name: order-service
    restart: always
    ports:
      - "8084:8084"
    environment:
      - spring.datasource.url=jdbc:mysql://mysql-orders:3306/revshop_orders_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - spring.datasource.username=root
      - spring.datasource.password=root12345
      - eureka.client.serviceUrl.defaultZone=http://eureka-server:8761/eureka/
      - jwt.secret=revshop-super-secret-key-for-jwt-2025-microservices
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    depends_on:
      mysql-orders:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - revshop-network

  payment-service:
    build: ./payment-service
    container_name: payment-service
    restart: always
    ports:
      - "8085:8085"
    environment:
      - spring.datasource.url=jdbc:mysql://mysql-payments:3306/revshop_payments_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - spring.datasource.username=root
      - spring.datasource.password=root12345
      - eureka.client.serviceUrl.defaultZone=http://eureka-server:8761/eureka/
      - jwt.secret=revshop-super-secret-key-for-jwt-2025-microservices
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    depends_on:
      mysql-payments:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - revshop-network

  notification-service:
    build: ./notification-service
    container_name: notification-service
    restart: always
    ports:
      - "8086:8086"
    environment:
      - spring.datasource.url=jdbc:mysql://mysql-notifications:3306/revshop_notifications_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - spring.datasource.username=root
      - spring.datasource.password=root12345
      - eureka.client.serviceUrl.defaultZone=http://eureka-server:8761/eureka/
      - jwt.secret=revshop-super-secret-key-for-jwt-2025-microservices
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    depends_on:
      mysql-notifications:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - revshop-network

networks:
  revshop-network:
    driver: bridge
