# Payment Service Configuration
server.port=8085
spring.application.name=payment-service
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/paymentdb
spring.datasource.username=root
spring.datasource.password=password
spring.jpa.hibernate.ddl-auto=update

# Payment Processing Configuration
payment.processor.stripe.api.key=sk_test_your_stripe_key
payment.processor.paypal.client.id=your-paypal-client-id
payment.processor.paypal.client.secret=your-paypal-secret
